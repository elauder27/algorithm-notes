<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlgoNotes</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <div class="sidebar">
        <div class="sidebar-header">AlgoNotes</div>
        <input class="search-bar" type="text" placeholder="Search notes..." />
        <button class="add-note-btn">+New note</button>

        <div class="note-list">
          <div class="note-card"></div>
        </div>
      </div>

      <div class="main-panel">
        <div class="main-header">
          <input type="text" class="note-title" placeholder="Note title.." />

          <select class="select-language">
            <option value="JavaScript">JavaScript</option>
            <option value="Python">Python</option>
            <option value="Java">Java</option>
            <option value="C++">C++</option>
            <option value="C#">C#</option>
            <option value="TypeScript">TypeScript</option>
          </select>

          <button class="delete-btn">Delete</button>
          <span class="saved-indicator">Saved</span>
        </div>
        <div class="main-content">
          <div class="steps-container"></div>

          <div class="input-field">
            <textarea
              class="code-snippet"
              id="code-snippet"
              placeholder="Describe the next step... (Shift + Enter for new line)"
            ></textarea>
            <button class="add-step-btn">Add Step</button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
